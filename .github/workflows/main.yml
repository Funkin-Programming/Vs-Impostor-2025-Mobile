name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: 'platform-tools build-tools;33.0.0 platforms;android-28 ndk;25.2.9519653'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Verify Android Paths
        run: |
          echo "Checking Android SDK..."
          ls -la /usr/local/lib/android/sdk/
          echo "Checking Android NDK..."
          ls -la /usr/local/lib/android/sdk/ndk/

      - name: Install Haxelib and Setup Android
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.2.9519653
        run: |
          mkdir -p assets/embeds/songs
          mkdir -p assets/fonts
          mkdir -p assets/shared
          mkdir -p assets/videos
          
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null
          haxelib install lime
          haxelib install openfl
          haxelib --never install flixel
          haxelib run lime setup flixel
          haxelib install flixel-tools
          haxelib install flixel-ui
          haxelib install flixel-addons
          haxelib install flxanimate
          haxelib install hxvlc
          haxelib install hscript
          
          mkdir -p ~/.lime
          cat > ~/.lime/config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <config>
            <platform name="Android">
              <architecture>armeabi-v7a</architecture>
              <architecture>arm64-v8a</architecture>
              <sdk path="/usr/local/lib/android/sdk" />
              <ndk path="/usr/local/lib/android/sdk/ndk/25.2.9519653" />
            </platform>
          </config>
          EOF
          
          haxelib list

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.2.9519653
        run: |
          echo "Environment:"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "Lime config:"
          cat ~/.lime/config.xml || echo "No lime config found"
          echo "Building APK..."
          haxelib run lime build android -release --app-version="1.0.0-${{ github.run_id }}" -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidBuild
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
